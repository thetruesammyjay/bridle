<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="Bridle — Multi-Agent DeFi Autonomous Wallet Platform on Solana. Monitor AI agents making autonomous trading decisions in real-time.">
  <title>Bridle — Agentic Wallet Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@300;400;500;600;700;800&family=Outfit:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <!-- Header -->
  <header id="main-header">
    <div class="header-left">
      <div class="logo">
        <i class="bi bi-wallet2 logo-icon"></i>
        <h1>Bridle</h1>
      </div>
      <span class="badge">Devnet</span>
    </div>
    <div class="header-right">
      <div class="status-indicator" id="connection-status">
        <span class="status-dot"></span>
        <span class="status-text">Connecting...</span>
      </div>
      <div class="header-stat" id="header-agent-count">
        <span class="stat-label">Agents</span>
        <span class="stat-value">0</span>
      </div>
      <div class="header-stat" id="header-total-trades">
        <span class="stat-label">Trades</span>
        <span class="stat-value">0</span>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main>
    <!-- Controls Bar -->
    <section id="controls-bar">
      <div class="spawn-form">
        <input type="text" id="agent-name" placeholder="Agent name (optional)" maxlength="20">
        <select id="risk-profile">
          <option value="conservative"><i class="bi bi-shield-check"></i> Conservative</option>
          <option value="moderate" selected>Moderate</option>
          <option value="aggressive">Aggressive</option>
        </select>
        <button id="spawn-btn" class="btn-primary">
          <i class="bi bi-plus-lg"></i>
          Spawn Agent
        </button>
      </div>
    </section>

    <!-- Agent Cards Grid -->
    <section id="agents-grid">
      <div id="empty-state" class="empty-state">
        <i class="bi bi-robot empty-icon"></i>
        <h2>No Agents Running</h2>
        <p>Spawn an agent to begin autonomous trading on Solana devnet</p>
      </div>
    </section>

    <!-- Activity Feed -->
    <section id="activity-section">
      <div class="section-header">
        <h2><i class="bi bi-activity"></i> Live Activity Feed</h2>
        <button id="clear-feed-btn" class="btn-ghost">Clear</button>
      </div>
      <div id="activity-feed">
        <div class="feed-empty">Waiting for agent activity...</div>
      </div>
    </section>
  </main>

  <!-- Toast Container -->
  <div id="toast-container"></div>

  <script src="app.js"></script>
</body>

</html>
